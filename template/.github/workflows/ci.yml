name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      # For constellation (core_backed) stars: mnemosyne-core resolves from the
      # public git pin in uv.lock; tests run against the local stub schema
      # fixture (tests/fixtures/schema), never the private spec.
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint + hygiene (same hooks as local pre-commit)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Type check (mypy)
        run: uv run mypy src tests

      - name: Type check (pyright)
        run: uv run pyright

      - name: Test
        run: uv run pytest --tb=short -q

      # Security scanners (template v0.3.0). pip-audit BLOCKS on a dependency CVE;
      # opengrep runs the vendored taint ruleset (rules/sast) and is a BLOCKING gate
      # while tuned. They complement the ruff `S` (AST) layer already in the
      # pre-commit gate above with dependency-vuln + data-flow coverage.
      - name: Dependency vuln scan (pip-audit)
        run: uv run --with pip-audit pip-audit

      - name: SAST (opengrep, scoped taint rules)
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
          export PATH="$HOME/.opengrep/cli/latest:$PATH"
          export LANG=C.UTF-8 LC_ALL=C.UTF-8
          opengrep scan --config rules/sast --error .
