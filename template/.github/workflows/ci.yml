name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for the workflow token (OpenSSF). Escalate per-job
# only where a step needs more (e.g. a release job that writes contents).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      # Actions are SHA-pinned (dependabot github-actions bumps them); the
      # trailing comment tracks the human-readable tag.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # For constellation (core_backed) stars: mnemosyne-core resolves from the
      # public git pin in uv.lock; tests run against the local stub schema
      # fixture (tests/fixtures/schema), never the private spec.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # --locked: CI must resolve EXACTLY the locked deps (no silent drift from
      # what the Dockerfile builds and ships).
      - name: Install dependencies
        run: uv sync --all-extras --locked

      - name: Lint + hygiene (same hooks as local pre-commit)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Type check (mypy)
        run: uv run mypy src tests

      - name: Type check (pyright)
        run: uv run pyright

      - name: Test
        run: uv run pytest --tb=short -q

      # Security scanners (template v0.6.0). pip-audit BLOCKS on a dependency CVE;
      # opengrep runs the vendored taint ruleset (rules/sast) and is a BLOCKING gate
      # while tuned. They complement the ruff `S` (AST) layer already in the
      # pre-commit gate above with dependency-vuln + data-flow coverage.
      - name: Dependency vuln scan (pip-audit)
        run: uv run --with pip-audit pip-audit

      # opengrep installer pinned to a release tag (was `main` — a moving,
      # unpinned curl|bash inside the security gate itself).
      - name: SAST (opengrep, scoped taint rules)
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/v1.23.0/install.sh | bash
          export PATH="$HOME/.opengrep/cli/latest:$PATH"
          export LANG=C.UTF-8 LC_ALL=C.UTF-8
          opengrep scan --config rules/sast --error .
