# admit.yml — Forgejo Actions: the local-eval admission gate for constellation stars.
#
# Admission is a stateless check, run ENTIRELY in CI — no service call. The gate
# computes the supply-chain facts (cosign verify, syft SBOM), builds the admission
# input from star.toml, and evaluates it against the signed, pinned policy authority
# image (`ouranos:policy-vN`) one-shot. The verdict is the eval's exit code.
#
# This replaces the F4 "post to Nyx" gate: admission was a pure function fused into
# Nyx's runtime service; here it is un-fused back to a local `opa eval`. Nyx keeps
# only runtime membership.
#
# Gate sequence (fail-closed: any non-zero exit blocks merge):
#   1. checkout      — the star repo at the PR ref.
#   2. load versions — .forgejo/versions.env -> $GITHUB_ENV.
#   3. install tools — uv, cosign, syft.
#   4. install deps  — uv sync (stellar_core, for build_admission_input).
#   5. supply-chain  — cosign verify (keyed) the star's image -> IMAGE_SIGNED; syft -> SBOM.
#   6. policy        — cosign verify + pull the pinned ouranos:policy-vN.
#   7. roster        — pull the Telescope fleet roster (stub until telescope:epoch-N ships).
#   8. eval          — build the input (stellar_core), `docker run` the eval image;
#                      exit 0 = admit, non-zero = deny (with reasons) / error (fail-closed).
#
# Environment (the [governance] pins; bump via Renovate):
#   OURANOS_IMAGE    the signed policy authority (default ouranos:policy-v1).
#   TELESCOPE_IMAGE  the signed fleet roster (default telescope:epoch-latest).
#   REGISTRY         container registry host (default forgejo.notusmi.com).
#
# Tool versions: .forgejo/versions.env. Signature scheme: KEYED (cosign.pub).

name: admit

on:
  pull_request:

env:
  REGISTRY: ${{ vars.REGISTRY || 'forgejo.notusmi.com' }}
  OURANOS_IMAGE: ${{ vars.OURANOS_IMAGE || 'forgejo.notusmi.com/rob/ouranos:policy-v1' }}
  TELESCOPE_IMAGE: ${{ vars.TELESCOPE_IMAGE || 'forgejo.notusmi.com/rob/telescope:epoch-latest' }}

jobs:
  gate:
    name: Admission gate
    runs-on: nas01
    defaults:
      run:
        shell: bash
    container:
      image: catthehacker/ubuntu:act-22.04
      # host network: cosign/syft/uv reach the Forgejo registry + PyPI behind the
      # Caddy SSO gate (nas01 tailnet identity). The docker socket: `docker run` the
      # ouranos eval image. No pantheon — admission is hermetic against signed artifacts.
      options: --network host -v /var/run/docker.sock:/var/run/docker.sock
    steps:
      - uses: https://github.com/actions/checkout@v4

      - name: Load tool versions
        run: grep -E '^[A-Z_]+=' .forgejo/versions.env >> "$GITHUB_ENV"

      - name: Install uv
        env:
          UV_INSTALL_DIR: /usr/local/bin
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install cosign
        run: |
          set -euo pipefail
          curl -LO --fail --retry 5 --retry-delay 2 --retry-all-errors \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          install -m 0755 cosign-linux-amd64 /usr/local/bin/cosign
          cosign version

      - name: Install syft
        run: |
          set -euo pipefail
          curl -LO --fail --retry 5 --retry-delay 2 --retry-all-errors \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          tar -xzf "syft_${SYFT_VERSION}_linux_amd64.tar.gz" syft
          install -m 0755 syft /usr/local/bin/syft
          syft version

      - name: Install Python dependencies
        run: uv sync --all-extras --locked

      - name: Compute supply-chain facts
        run: |
          set -euo pipefail
          IMAGE_DECLARED="false"; IMAGE_SIGNED="false"; SBOM_PRESENT="false"
          IMAGE_REF=$(uv run python -c "
          import tomllib
          print(tomllib.loads(open('star.toml').read()).get('image', {}).get('ref', ''))
          " 2>/dev/null || true)
          if [ -n "${IMAGE_REF}" ]; then
            IMAGE_DECLARED="true"
            echo "Verifying supply-chain for ${IMAGE_REF}"
            # cosign verify IS the in-process signature check (the gate has registry
            # access; the constellation key is cosign.pub). The boolean fact feeds the
            # supply_chain rego rules.
            if cosign verify --key cosign.pub --insecure-ignore-tlog=true "${IMAGE_REF}" >/dev/null 2>&1; then
              IMAGE_SIGNED="true"
            fi
            if syft "${IMAGE_REF}" -o spdx-json --file sbom.spdx.json >/dev/null 2>&1; then
              SBOM_PRESENT="true"
            fi
          else
            echo "No [image].ref in star.toml — supply-chain rules are exempt (image_declared=false)"
          fi
          echo "IMAGE_DECLARED=${IMAGE_DECLARED}" >> "${GITHUB_ENV}"
          echo "IMAGE_SIGNED=${IMAGE_SIGNED}" >> "${GITHUB_ENV}"
          echo "SBOM_PRESENT=${SBOM_PRESENT}" >> "${GITHUB_ENV}"

      - name: Verify + pull the policy authority
        run: |
          set -euo pipefail
          # Trust the policy before trusting its verdict: the eval image is signed by
          # the constellation key (cosign.pub), same as every star.
          cosign verify --key cosign.pub --insecure-ignore-tlog=true "${OURANOS_IMAGE}"
          docker pull "${OURANOS_IMAGE}"

      - name: Pull the fleet roster (Telescope)
        run: |
          set -euo pipefail
          # TODO(Telescope): once telescope:epoch-N is published, pull the signed
          # roster artifact (oras pull "${TELESCOPE_IMAGE}" -> /tmp/fleet.json) and
          # cosign-verify it. Until then, a stub keeps the cross-star rules inert.
          echo '{"fleet":{}}' > /tmp/fleet.json
          echo "roster: stub (cross-star rules inert until Telescope ships)"

      - name: Build the admission input
        run: |
          set -euo pipefail
          uv run python - <<'PYEOF'
          import json
          import pathlib

          from stellar_core import build_admission_input

          star_toml = pathlib.Path("star.toml").read_text(encoding="utf-8")
          supply_chain = {
              "image_declared": "${IMAGE_DECLARED}" == "true",
              "image_signed": "${IMAGE_SIGNED}" == "true",
              "sbom_present": "${SBOM_PRESENT}" == "true",
          }
          migrations = []
          if pathlib.Path("migrations").is_dir():
              migrations = [
                  {"file": f.name, "namespace": ""}
                  for f in sorted(pathlib.Path("migrations").iterdir())
                  if f.is_file()
              ]
          doc = build_admission_input(
              star_toml, supply_chain=supply_chain, migrations=migrations,
          )
          pathlib.Path("/tmp/admission-input.json").write_text(json.dumps(doc))
          PYEOF

      - name: Evaluate admission (local opa eval — no service)
        run: |
          set -euo pipefail
          set +e
          OUT=$(docker run --rm -i -v /tmp/fleet.json:/fleet.json "${OURANOS_IMAGE}" \
            --data /fleet.json < /tmp/admission-input.json)
          CODE=$?
          set -e
          if [ "${CODE}" -ne 0 ]; then
            echo "ADMISSION DENIED:" >&2
            echo "${OUT}" | uv run python -c "
          import sys, json
          try:
              v = json.load(sys.stdin)['result'][0]['expressions'][0]['value']
              for r in v:
                  print('  - ' + str(r), file=sys.stderr)
          except Exception:
              pass
          " || true
            exit 1
          fi
          echo "Admitted."
