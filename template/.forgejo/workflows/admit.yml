# admit.yml — Forgejo Actions: thin Nyx admission gate for constellation stars.
#
# Replaces the baked born-with gate (conftest/oras/bundle/constellation.gate).
# CI computes supply-chain facts (cosign verify, syft SBOM); then posts the
# star's facts to Nyx via stellar_core.request_admission and enforces the
# verdict. Nyx runs the imperative checks AND the Ouranos policy consult.
#
# Gate sequence (fail-closed: any non-zero exit blocks merge):
#
#   1. checkout         — get the star repo at the PR ref.
#   2. load versions    — .forgejo/versions.env -> $GITHUB_ENV.
#   3. install tools    — uv, cosign, syft.
#   4. install deps     — uv sync (stellar_core comes from the forgejo PyPI index).
#   5. supply-chain     — cosign verify (keyed) the star's image → IMAGE_SIGNED;
#                         syft generates SBOM → SBOM_PRESENT.
#   6. post to nyx      — stellar_core.request_admission posts facts to
#                         NYX_ADMIT_URL (default http://nyx:8000/admit); exits
#                         non-zero on deny (any reason, any failure mode).
#
# Environment:
#   NYX_ADMIT_URL   Override the Nyx admission endpoint (default: http://nyx:8000/admit).
#   REGISTRY        Container registry host (default: forgejo.notusmi.com).
#
# Tool versions: .forgejo/versions.env (single source, shared with deploy.yml).
# Signature scheme: KEYED — cosign verify against cosign.pub (matches deploy.yml).

name: admit

on:
  pull_request:

env:
  REGISTRY: ${{ vars.REGISTRY || 'forgejo.notusmi.com' }}
  NYX_ADMIT_URL: ${{ vars.NYX_ADMIT_URL || 'http://nyx:8000/admit' }}

jobs:
  gate:
    name: Admission gate
    runs-on: nas01
    defaults:
      run:
        shell: bash
    container:
      image: catthehacker/ubuntu:act-22.04
    steps:
      - uses: https://github.com/actions/checkout@v4

      # Single source of truth for tool versions (shared with deploy.yml).
      - name: Load tool versions
        run: grep -E '^[A-Z_]+=' .forgejo/versions.env >> "$GITHUB_ENV"

      - name: Install uv
        env:
          UV_INSTALL_DIR: /usr/local/bin
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install cosign
        run: |
          set -euo pipefail
          curl -LO --fail --retry 5 --retry-delay 2 --retry-all-errors \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          install -m 0755 cosign-linux-amd64 /usr/local/bin/cosign
          cosign version

      - name: Install syft
        run: |
          set -euo pipefail
          curl -LO --fail --retry 5 --retry-delay 2 --retry-all-errors \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          tar -xzf "syft_${SYFT_VERSION}_linux_amd64.tar.gz" syft
          install -m 0755 syft /usr/local/bin/syft
          syft version

      - name: Install Python dependencies
        run: uv sync --all-extras --locked

      - name: Compute supply-chain facts
        id: supply_chain
        run: |
          set -euo pipefail
          IMAGE_SIGNED="false"
          SBOM_PRESENT="false"
          IMAGE_REF=$(uv run python -c "
          import tomllib
          data = tomllib.loads(open('star.toml').read())
          print(data.get('image', {}).get('ref', ''))
          " 2>/dev/null || true)
          if [ -n "${IMAGE_REF}" ]; then
            echo "Checking supply-chain for image: ${IMAGE_REF}"
            if cosign verify --key cosign.pub "${IMAGE_REF}" 2>/dev/null; then
              IMAGE_SIGNED="true"
            fi
            if syft "${IMAGE_REF}" -o spdx-json --file sbom.spdx.json 2>/dev/null; then
              SBOM_PRESENT="true"
            fi
          else
            echo "No image ref in star.toml — supply-chain not attested (IMAGE_SIGNED=false)"
          fi
          echo "IMAGE_SIGNED=${IMAGE_SIGNED}" >> "${GITHUB_ENV}"
          echo "SBOM_PRESENT=${SBOM_PRESENT}" >> "${GITHUB_ENV}"

      - name: Post facts to Nyx and enforce verdict
        env:
          NYX_ADMIT_URL: ${{ env.NYX_ADMIT_URL }}
        run: |
          set -euo pipefail
          uv run python - <<'PYEOF'
          import json
          import pathlib
          import sys
          import tomllib

          from stellar_core import request_admission

          star_toml = pathlib.Path("star.toml").read_text(encoding="utf-8")
          supply_chain = {
              "image_signed": "${IMAGE_SIGNED}" == "true",
              "sbom_present": "${SBOM_PRESENT}" == "true",
          }

          migrations = []
          if pathlib.Path("migrations").is_dir():
              migrations = [
                  {"file": f.name, "namespace": ""}
                  for f in sorted(pathlib.Path("migrations").iterdir())
                  if f.is_file()
              ]

          # Optional schema-registry context (non-interstellar stars omit it).
          registry = None

          facts = {
              "star_toml": star_toml,
              "supply_chain": supply_chain,
              "migrations": migrations,
          }
          if registry is not None:
              facts["registry"] = registry

          verdict = request_admission(facts)
          if not verdict.admit:
              print("ADMISSION DENIED:", file=sys.stderr)
              for reason in verdict.reasons:
                  print(f"  - {reason}", file=sys.stderr)
              sys.exit(1)
          print("Admitted.")
          PYEOF
