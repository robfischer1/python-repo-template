# admit.yml — Forgejo Actions: thin Nyx admission gate for constellation stars.
#
# Replaces the baked born-with gate (conftest/oras/bundle/constellation.gate).
# CI computes supply-chain facts (cosign verify, syft SBOM); then posts the
# star's facts to Nyx via stellar_core.request_admission and enforces the
# verdict. Nyx runs the imperative checks AND the Ouranos policy consult.
#
# Gate sequence (fail-closed: any non-zero exit blocks merge):
#
#   1. checkout         — get the star repo at the PR ref.
#   2. load versions    — .forgejo/versions.env -> $GITHUB_ENV.
#   3. install tools    — uv, cosign, syft.
#   4. install deps     — uv sync (stellar_core comes from the forgejo PyPI index).
#   5. fetch signature  — cosign triangulate resolves the image digest, then
#                         cosign download signature fetches the signature + signed
#                         payload. CI only TRANSPORTS them — Nyx verifies the crypto
#                         itself (against the committed cosign.pub), so a forged or
#                         absent signature cannot be admitted. syft → SBOM_PRESENT.
#   6. post to nyx      — stellar_core.request_admission posts {star_toml,
#                         image_digest, signature, payload, sbom_present} to
#                         NYX_ADMIT_URL (default http://nyx:8000/admit); exits
#                         non-zero on deny (any reason, any failure mode).
#
# Environment:
#   NYX_ADMIT_URL   Override the Nyx admission endpoint (default: http://nyx:8000/admit).
#   REGISTRY        Container registry host (default: forgejo.notusmi.com).
#
# Tool versions: .forgejo/versions.env (single source, shared with deploy.yml).
# Signature scheme: KEYED — Nyx verifies the posted signature against cosign.pub
# in-process (the same key deploy.yml signs with); CI only fetches + transports it.

name: admit

on:
  pull_request:

env:
  REGISTRY: ${{ vars.REGISTRY || 'forgejo.notusmi.com' }}
  NYX_ADMIT_URL: ${{ vars.NYX_ADMIT_URL || 'http://nyx:8000/admit' }}

jobs:
  gate:
    name: Admission gate
    runs-on: nas01
    defaults:
      run:
        shell: bash
    container:
      image: catthehacker/ubuntu:act-22.04
      # host network: `uv sync` resolves the stellar_core SDK from the Forgejo
      # PyPI behind the Caddy SSO gate, which only nas01's tailnet identity clears.
      options: --network host
    steps:
      - uses: https://github.com/actions/checkout@v4

      # Single source of truth for tool versions (shared with deploy.yml).
      - name: Load tool versions
        run: grep -E '^[A-Z_]+=' .forgejo/versions.env >> "$GITHUB_ENV"

      - name: Install uv
        env:
          UV_INSTALL_DIR: /usr/local/bin
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install cosign
        run: |
          set -euo pipefail
          curl -LO --fail --retry 5 --retry-delay 2 --retry-all-errors \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          install -m 0755 cosign-linux-amd64 /usr/local/bin/cosign
          cosign version

      - name: Install syft
        run: |
          set -euo pipefail
          curl -LO --fail --retry 5 --retry-delay 2 --retry-all-errors \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          tar -xzf "syft_${SYFT_VERSION}_linux_amd64.tar.gz" syft
          install -m 0755 syft /usr/local/bin/syft
          syft version

      - name: Install Python dependencies
        run: uv sync --all-extras --locked

      - name: Fetch image signature for Nyx to verify
        id: supply_chain
        run: |
          set -euo pipefail
          IMAGE_DIGEST=""; SIGNATURE=""; PAYLOAD=""; SBOM_PRESENT="false"
          IMAGE_REF=$(uv run python -c "
          import tomllib
          data = tomllib.loads(open('star.toml').read())
          print(data.get('image', {}).get('ref', ''))
          " 2>/dev/null || true)
          if [ -n "${IMAGE_REF}" ]; then
            echo "Resolving signature for image: ${IMAGE_REF}"
            # Resolve the real image digest from the registry (sig tag -> digest),
            # independent of the payload, so Nyx's digest-binding check is meaningful.
            SIGTAG=$(cosign triangulate "${IMAGE_REF}" 2>/dev/null || true)
            if [ -n "${SIGTAG}" ]; then
              D=$(printf '%s' "${SIGTAG}" | sed -E 's/.*:sha256-([0-9a-f]{64})\.sig$/\1/')
              REPO="${IMAGE_REF%@*}"; REPO="${REPO%:*}"
              IMAGE_DIGEST="${REPO}@sha256:${D}"
              # Download the signature + signed payload — the material Nyx verifies
              # offline against the committed cosign.pub. CI only transports it.
              SIGJSON=$(cosign download signature "${IMAGE_DIGEST}" 2>/dev/null | head -1 || true)
              SIGNATURE=$(printf '%s' "${SIGJSON}" | jq -r '.Base64Signature // empty')
              PAYLOAD=$(printf '%s' "${SIGJSON}" | jq -r '.Payload // empty')
            fi
            if syft "${IMAGE_REF}" -o spdx-json --file sbom.spdx.json 2>/dev/null; then
              SBOM_PRESENT="true"
            fi
          else
            echo "No image ref in star.toml — no signature to post (Nyx will deny)"
          fi
          {
            echo "IMAGE_DIGEST=${IMAGE_DIGEST}"
            echo "SIGNATURE=${SIGNATURE}"
            echo "PAYLOAD=${PAYLOAD}"
            echo "SBOM_PRESENT=${SBOM_PRESENT}"
          } >> "${GITHUB_ENV}"

      - name: Post facts to Nyx and enforce verdict
        env:
          NYX_ADMIT_URL: ${{ env.NYX_ADMIT_URL }}
        run: |
          set -euo pipefail
          uv run python - <<'PYEOF'
          import json
          import pathlib
          import sys
          import tomllib

          from stellar_core import request_admission

          star_toml = pathlib.Path("star.toml").read_text(encoding="utf-8")

          migrations = []
          if pathlib.Path("migrations").is_dir():
              migrations = [
                  {"file": f.name, "namespace": ""}
                  for f in sorted(pathlib.Path("migrations").iterdir())
                  if f.is_file()
              ]

          # Optional schema-registry context (non-interstellar stars omit it).
          registry = None

          facts = {
              "star_toml": star_toml,
              "image_digest": "${IMAGE_DIGEST}",
              "signature": "${SIGNATURE}",
              "payload": "${PAYLOAD}",
              "supply_chain": {"sbom_present": "${SBOM_PRESENT}" == "true"},
              "migrations": migrations,
          }
          if registry is not None:
              facts["registry"] = registry

          verdict = request_admission(facts)
          if not verdict.admit:
              print("ADMISSION DENIED:", file=sys.stderr)
              for reason in verdict.reasons:
                  print(f"  - {reason}", file=sys.stderr)
              sys.exit(1)
          print("Admitted.")
          PYEOF
