# Forgejo Actions: PR gate for a stamped Forge python repo.
# Runs the same lint/type/test + security scanners as the deploy gate, but does
# NOT build or deploy -- it gates pull requests so failures surface BEFORE the
# merge-to-main deploy, not after. Runs on the nas01 self-hosted runner; no
# docker socket needed (no image work here).
#
# Stamped for every python repo, not just core_backed stars -- the gate is
# generic. (core_backed stars additionally resolve mnemosyne-core from the
# uv.lock pin and test against the local stub schema fixture, never the private
# spec.)

name: ci
on:
  pull_request:

jobs:
  gate:
    runs-on: nas01
    container:
      image: catthehacker/ubuntu:act-22.04   # glibc for the uv installer
    steps:
      - uses: https://github.com/actions/checkout@v4

      # Install uv via its official script (astral-sh/setup-uv 403/404s on Forgejo).
      - name: Install uv
        env:
          UV_INSTALL_DIR: /usr/local/bin
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Gate — lint / secret-scan / type / test
        run: |
          uv sync --all-extras --locked
          uv run pre-commit run --all-files --show-diff-on-failure
          uv run mypy src tests
          uv run pyright
          uv run pytest -q

      # pip-audit BLOCKS on a dependency CVE (editable local pkgs are skipped
      # non-fatally without --strict).
      - name: Dependency vuln scan (pip-audit)
        run: uv run --with pip-audit pip-audit

      # opengrep runs the vendored taint ruleset (rules/sast), a BLOCKING gate while
      # tuned. LANG forces UTF-8: opengrep reads files under the C locale otherwise
      # and dies on any non-ASCII byte.
      - name: SAST (opengrep, scoped taint rules)
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/v1.23.0/install.sh | bash
          export PATH="$HOME/.opengrep/cli/latest:$PATH"
          export LANG=C.UTF-8 LC_ALL=C.UTF-8
          opengrep scan --config rules/sast --error .
