# Caller stub (Flame pull-CI) — logic lives in foundry/foundry-stocks; invariant,
# copier-shipped. Retires the ci.tf pour + the launcher/channel.
name: ci
on:
  pull_request:
    paths-ignore:
      - ".forgejo/**"
      - "**.md"
jobs:
  ci:
    uses: foundry/foundry-stocks/.forgejo/workflows/ci.yml@main
    # pragma comment: detect-secrets flags the word 'secrets' as a Secret Keyword,
    # and `secrets: inherit` is the reusable-workflow idiom, not a credential.
    secrets: inherit  # pragma: allowlist secret
