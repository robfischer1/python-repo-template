# Python-repo copier template — stamps a standard Forge Python project.
# `mcp = true`  -> a container-ready FastMCP service (the formalized vault-mcp
#                 shape: server.py, mcp[cli], Dockerfile/compose, deploy gate).
# `mcp = false` -> a plain Python library / CLI: the same QA/CI/lint spine,
#                 no service machinery. Realizes the service-repo standard:
# furnace/docs/service-repo-standard.md. copier lays the pure-code body; the
# final `_task` runs `furnace ignite` to pour the governance kit (the `code-repo`
# furnace kit) — copier owns repo creation, furnace owns the `.claude/` layer.

_subdirectory: template
_min_copier_version: "9.0.0"

# `_skip_if_exists` = every rendered path EXCEPT the two seams (pyproject.toml +
# .gitignore). It scopes copier to what copier is good at: create-if-absent for
# the star-owned stubs (README/docs/source) on birth, and a 3-way merge for the
# seams on update — nothing else. A star builds out its README and src after
# birth; a `copier update`/anneal must NOT 3-way-merge them (the fleet-wide
# README conflict that failed the anneal arm closed). The foundry conformance
# files (.forgejo, pre-commit, editorconfig, …) are skipped here so update never
# conflicts them; anneal CLOBBERS them from a fresh render (Flame C2) — a
# conformance surface is enforced, not merged. Paths are RENDERED destination
# paths (template/ stripped by _subdirectory, .jinja stripped). Kept in sync
# with hephaestus `ownership.py`'s non-seam set (Flame C1).
_skip_if_exists:
  # star-owned: rendered once at birth, then the star's
  - README.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - LICENSE
  - SECURITY.md
  - src/**
  - tests/**
  # foundry conformance: skipped here, clobbered by anneal (C2)
  - .editorconfig
  - .python-version
  - .dockerignore
  - .pre-commit-config.yaml
  - .forgejo/**
  - .github/**
  - rules/**
  - cosign.pub

project_name:
  type: str
  help: Human-readable project name (e.g. "Widget MCP")

package_name:
  type: str
  help: Importable package name (snake_case)
  default: "{{ project_name | lower | replace(' ', '_') | replace('-', '_') }}"

service_name:
  type: str
  help: Distribution / repo / image name (kebab-case); also the console-script when mcp
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

description:
  type: str
  help: One-line project description
  default: A standard Forge Python project.

mcp:
  type: bool
  help: "FastMCP service shape (server.py, mcp[cli], container, deploy). Off = plain library/CLI."
  default: true

core_backed:
  type: bool
  help: "Builds FROM mnemosyne-core-base (baked core + schema). For constellation stars."
  default: false
  when: "{{ mcp }}"

core_base_tag:
  type: str
  help: "mnemosyne-core-base IMAGE tag (the baked private schema, e.g. v0.1.0)"
  default: v0.1.0
  when: "{{ mcp and core_backed }}"

core_version:
  type: str
  help: "mnemosyne-core git tag for the uv pin (the core package, e.g. v0.2.0)"
  default: v0.2.0
  when: "{{ mcp and core_backed }}"

# --- Sovereign store (chaos pattern) ----------------------------------------
# A sovereign star OWNS its database (no shared tables across stars): an own-DB
# service on a private network, the app internal-only (no host port), the DB
# password fail-closed from an env secret. Off = the interim shared-corpus shape
# (host port published, external DATABASE_URL).
sovereign_database:
  type: bool
  help: "Constellation star owns its own sovereign database (chaos pattern)?"
  default: false
  # Independent of core_backed: a standalone (non-core-backed) star can still own
  # a sovereign DB (e.g. terpsichore — pontus-free, but holds terpsichore-db).
  when: "{{ mcp }}"

db_kind:
  type: str
  help: "DB image kind; pgvector for similarity search"
  default: postgres
  choices:
    - postgres
    - pgvector
  when: "{{ mcp and sovereign_database }}"

port:
  type: int
  help: Default streamable-HTTP listen port
  default: 8000
  when: "{{ mcp }}"

verb_prefix:
  type: str
  help: "Hades verb namespace (e.g. 'graph'); blank = bare verbs. Rendered into the /infra roster row + hades route table."
  default: ""
  when: "{{ mcp }}"

# --- Deploy shape --------------------------------------------------------------
# The `decentralized` question is RETIRED (Flame C4/C6, decoupled): it conflated
# two things recentralization split apart -- a star no longer owns its `/infra`
# (the tofu ROOTS live in rob/infra now, so this template scaffolds NO infra/),
# but every mcp star's build/deploy IS tofu-managed from the foundry core (the F5
# managed-CI plane), so furnace pours only the PR gates (code-repo-sdd-
# decentralized). That kit choice now rides `mcp` alone (see the ignite _task).

author_name:
  type: str
  help: Copyright holder / author
  default: Rob Fischer

year:
  type: int
  help: Copyright year
  default: 2026

# --- Star manifest (constellation) ------------------------------------------
# star.toml is NO LONGER stamped by copier (template/star.toml.jinja retired):
# hephaestus's derivation is its sole author (the derived port/image/interface
# keys are authoritative, and copier can't derive a port). These answers remain
# as identity inputs some other template files read; hephaestus re-authors
# star.toml on strike + reconciles it on anneal. The admission gate
# (.forgejo/workflows/admit.yml) still reads the resulting star.toml at PR time.

charter:
  type: str
  help: "The star's single-responsibility charter (<= 100 chars) — the SRP gate"
  default: "{{ description }}"

cluster:
  type: str
  help: Constellation cluster this star belongs to
  default: pantheon

star_namespace:
  type: str
  help: "Sovereign namespace this star owns (no shared tables across stars)"
  default: "{{ package_name }}"

substrate_kind:
  type: str
  help: "Deployment substrate kind (container | pod | ...) — the Candidacy litmus"
  default: container

interstellar:
  type: bool
  help: "Produces/consumes Kafka events? Adds async = [\"kafka\"] to the manifest."
  default: false

# Setup tasks. Most are init-only (gated to copy), EXCEPT `uv lock`, which also
# runs on `copier update` so a template pyproject change never leaves a stale
# lock. copy leaves a ready git repo with a synced env + installed hooks.
_tasks:
  # Normalize the copier-generated answers file to end with exactly one newline.
  # copier emits `.copier-answers.yml` without a trailing newline, which fails the
  # end-of-file-fixer pre-commit hook -> a red CI gate on the first PR of every
  # stamped/updated repo. Ungated: runs on BOTH copy and update.
  - command: python -c "import pathlib; p=pathlib.Path('.copier-answers.yml'); p.write_text(p.read_text(encoding='utf-8').rstrip()+chr(10), encoding='utf-8')"
  # Flame C4 -- migrate a pre-recentralization star. Recentralization moved the
  # tofu ROOTS to rob/infra, so the star-local `infra/` tree + `compose.yaml` are
  # dead weight; the ONE thing the star still owns -- its sovereign spec -- is
  # RELOCATED to `{star}.tfvars` at root (rob/infra harvests it as
  # catalog/{star}.tfvars). MOVE before REMOVE so the operator's env survives.
  # Update-only (a fresh copy has neither); idempotent (a migrated star no-ops via
  # the existence guard + --ignore-unmatch). The removals land because anneal's
  # verdict rules the retired shapes REMOVABLE (Flame C5).
  - command: test -f infra/terraform.tfvars && git mv -f infra/terraform.tfvars {{ service_name }}.tfvars || true
    when: "{{ _copier_operation == 'update' and mcp }}"
  - command: git rm -r --ignore-unmatch --quiet compose.yaml infra || true
    when: "{{ _copier_operation == 'update' and mcp }}"
  - command: git init -q
    when: "{{ _copier_operation == 'copy' }}"
  # Forgejo is git-primary (origin); GitHub is the push-mirror target — the
  # standard Forge remote pattern. The remote repo must still be created on
  # Forgejo first (push-to-create is disabled instance-wide); these only wire
  # the local remotes to the convention so `git push -u origin main` is ready.
  # Idempotent (set-url-or-add): a re-strike into a reused workdir must converge,
  # not die on "remote origin already exists" — the strike contract is idempotent.
  - command: git remote set-url origin https://forgejo.notusmi.com/rob/{{ service_name }}.git 2>/dev/null || git remote add origin https://forgejo.notusmi.com/rob/{{ service_name }}.git
    when: "{{ _copier_operation == 'copy' }}"
  - command: git remote set-url github https://github.com/robfischer1/{{ service_name }}.git 2>/dev/null || git remote add github https://github.com/robfischer1/{{ service_name }}.git
    when: "{{ _copier_operation == 'copy' }}"
  - command: uv sync --extra dev
    when: "{{ _copier_operation == 'copy' }}"
  # Re-lock on EVERY operation, including `update`: a template bump that touches
  # pyproject (e.g. a new optional-dependency) otherwise leaves a star with a
  # stale uv.lock that the admission gate's `uv sync --locked` rejects. No `when:`
  # -> runs on update too; `uv lock` is idempotent (no-op when already current).
  - command: uv lock
  - command: uvx detect-secrets@1.5.0 scan > .secrets.baseline
    when: "{{ _copier_operation == 'copy' }}"
  - command: uv run pre-commit install
    when: "{{ _copier_operation == 'copy' }}"
  # Spec-Driven Development scaffold. spec-kit init lays .specify/ (ps scripts +
  # core templates) and the claude speckit-* skills. NOTE: spec-kit no longer
  # git-inits (git is opt-in since 0.10.0) — the `git init -q` above is load-bearing.
  # `specify` must be on PATH. Runs BEFORE furnace ignite so the surface's
  # speckit-plan override skill (poured next) wins as last writer.
  - command: specify init --here --force --integration claude --script ps --ignore-agent-tools
    when: "{{ _copier_operation == 'copy' }}"
  # Cede CLAUDE.md to furnace: spec-kit's agent-context (the <!-- SPECKIT --> markers)
  # fights furnace's CLAUDE.md @AGENTS.md shim, which furnace repours every ignite.
  # The extension is deprecated (removed in spec-kit 0.12.0); `|| true` makes this a
  # no-op on >=0.12.0 (where `disable` errors "not installed" and would fail the whole
  # strike) while still disabling it on any older spec-kit that predates the removal.
  - command: specify extension disable agent-context || true
    when: "{{ _copier_operation == 'copy' }}"
  # Pour the furnace governance kit (the .claude/ AI layer) as the final step.
  # code-repo-sdd = code-repo + the speckit surface (.specify/ overrides + the
  # speckit-plan command override + the forge-feature workflow). Must run AFTER
  # `specify init` so the override skill overwrites spec-kit's core one.
  # Needs `furnace` on PATH + $FURNACE_SOURCE set. A failure here rolls back the
  # whole stamp (copier task semantics) — intentional: no half-governed repo.
  # --hammer: this task is copy-only (strike), so the workdir is a born-fresh
  # copier+spec-kit scaffold with no real local edits to protect; ignite is the
  # designed last writer over it (it overwrites spec-kit's core speckit-plan skill),
  # so override stoke's clobber guard. The guard still protects an existing star on
  # anneal/update, which re-pours governance a different way (not via this copy-task).
  # The kit rides `mcp` alone (Flame C6, decoupled from the retired
  # `decentralized`): an mcp star is tofu-managed from the foundry core, so
  # furnace pours only the PR gates (code-repo-sdd-decentralized); a plain
  # library takes the base code-repo-sdd.
  - command: furnace ignite . --hammer --kit {{ 'code-repo-sdd-decentralized' if mcp else 'code-repo-sdd' }}
    when: "{{ _copier_operation == 'copy' }}"
  # NOTE: a star no longer scaffolds `/infra` (Flame C4) — the tofu roots live in
  # rob/infra, which harvests the sovereign shape from the star's {star}.tfvars.
  # copier needs no docker or Forgejo creds to stamp a star.
  # Verify the plan-command override resolves as the project-tier winner.
  - command: specify preset resolve speckit.plan
    when: "{{ _copier_operation == 'copy' }}"
